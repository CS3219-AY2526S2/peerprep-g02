services:
  # Frontend
  frontend:
    build: ./frontend
    container_name: peerprep-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - gateway
    networks:
      - gateway-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # API Gateway (nginx)
  gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - matching-service
      - questions-service
      - attempts-service
      - collaboration-service
    networks:
      - gateway-network
    restart: unless-stopped

  #   # Message Broker (RabbitMQ)
  #   rabbitmq:
  #     image: rabbitmq:latest
  #     container_name: rabbitmq
  #     hostname: rabbitmq
  #     networks:
  #       - gateway-network
  #     healthcheck:
  #       test: rabbitmq-diagnostics check_port_connectivity
  #       interval: 30s
  #       timeout: 30s
  #       retries: 10
  #       start_period: 30s
  #     restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./backend/services/userService
      dockerfile: Dockerfile
    container_name: peerprep-user-service
    env_file:
      - ./backend/services/userService/.env
    environment:
      DATABASE_URI: postgresql://postgres:postgres@user-db:5432/peerprep_user
      PORT: 3001
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - gateway-network
      - user-db-network
    ports:
      - "3001:3001"
    restart: unless-stopped

  user-db:
    image: postgres:16-alpine
    container_name: peerprep-user-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerprep_user
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - user-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Matching Service
  matching-service:
    build: ./backend/services/matchingService
    container_name: matching-service
    env_file:
      - ./backend/services/matchingService/.env
    depends_on:
      matching-redis:
        condition: service_started
    networks:
      - gateway-network
      - matching-redis-network
    ports:
      - "3002:3002"
    environment:
      - MS_SERVER_PORT=3002
      - MS_ENV=development
      - MS_REDIS_URL=redis://matching-redis:6379
      - US_INTERNAL_SERVICE_URL=http://user-service:3001
      - MS_COLLABORATION_SERVICE_URL=http://collaboration-service:3003
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/peerprep-pubsub-key.json
    volumes:
      - ./secrets:/secrets:ro
    restart: unless-stopped

  matching-redis:
    image: redis:latest
    container_name: matching-redis
    restart: unless-stopped
    networks:
      - matching-redis-network

  # Questions Service
  questions-service:
    build: ./backend/services/questionService
    container_name: questions-service
    env_file:
      - ./backend/services/questionService/.env
    environment:
      - DB_HOST=questions-db
    ports:
      - "3005:3005"
    depends_on:
      questions-db:
        condition: service_started
    networks:
      - gateway-network
      - questions-db-network
    restart: unless-stopped

  questions-db:
    image: postgres:16-alpine
    container_name: questions-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: questions
    volumes:
      - questions_data:/var/lib/postgresql
    networks:
      - questions-db-network
    restart: unless-stopped

  pgadmin:
    container_name: container-pgadmin
    image: dpage/pgadmin4
    depends_on:
      - questions-db
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@gmail.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    networks:
      - questions-db-network
    restart: unless-stopped

  # Collaboration Service
  collaboration-service:
    build: ./backend/services/collaborationService
    container_name: collaboration-service
    env_file:
      - ./backend/services/collaborationService/.env
    environment:
      - CS_SERVER_PORT=3003
      - CS_API_GATEWAY_URL=http://gateway:8080
      - CS_REDIS_HOST=collaboration-redis
      - CS_REDIS_PORT=6379
      - CS_DATABASE_URI=postgresql://postgres:postgres@collaboration-db:5432/collaboration
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/peerprep-pubsub-key.json
    depends_on:
      collaboration-redis:
        condition: service_started
      collaboration-db:
        condition: service_healthy
      user-service:
        condition: service_started
      questions-service:
        condition: service_started
    networks:
      - gateway-network
      - collaboration-redis-network
      - collaboration-db-network
    ports:
      - "3003:3003"
    restart: unless-stopped

  collaboration-db:
    image: postgres:16-alpine
    container_name: collaboration-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collaboration
    ports:
      - "5434:5432"
    volumes:
      - collaboration_data:/var/lib/postgresql/data
    networks:
      - collaboration-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collaboration"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  collaboration-redis:
    image: redis:latest
    container_name: collaboration-redis
    restart: unless-stopped
    networks:
      - collaboration-redis-network

  # Attempts Service
  attempts-service:
    build:
      context: ./backend/services/attemptService
      dockerfile: Dockerfile
    container_name: attempts-service
    env_file:
      - ./backend/services/attemptService/.env
    environment:
      DATABASE_URI: postgresql://postgres:postgres@attempts-db:5432/peerprep_attempt
      PORT: 3004
      USER_SERVICE_URL: http://user-service:3001
    depends_on:
      attempts-db:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - gateway-network
      - attempts-db-network
    ports:
      - "3004:3004"
    restart: unless-stopped

  attempts-db:
    image: postgres:16-alpine
    container_name: attempts-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerprep_attempt
    ports:
      - "5436:5432"
    volumes:
      - attempts_data:/var/lib/postgresql/data
    networks:
      - attempts-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep_attempt"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  user_data:
  matching_data:
  questions_data:
  collaboration_data:
  attempts_data:
#   redis_data:

networks:
  gateway-network:
    driver: bridge
  user-db-network:
    driver: bridge
  matching-redis-network:
    driver: bridge
  questions-db-network:
    driver: bridge
  collaboration-redis-network:
    driver: bridge
  collaboration-db-network:
    driver: bridge
  attempts-db-network:
    driver: bridge
