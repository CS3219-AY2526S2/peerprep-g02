services:
  frontend:
    build: ./frontend
    container_name: peerprep-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./secrets/frontend/.env
    depends_on:
      - gateway
    networks:
      - gateway-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - matching-service
      - questions-service
      - attempts-service
      - collaboration-service
      - message-service
    networks:
      - gateway-network
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: peerprep-ngrok
    depends_on:
      - gateway
    env_file:
      - ./secrets/ngrok/.env
    command: http --url=nonjuridical-unflaunting-hudson.ngrok-free.dev gateway:8080
    ports:
      - "4040:4040"
    networks:
      - gateway-network
    restart: unless-stopped

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 8888:8080
    depends_on:
      - gateway
    env_file:
      - ./secrets/dozzle/.env

  user-service:
    build:
      context: ./backend/services/userService
      dockerfile: Dockerfile
    container_name: peerprep-user-service
    env_file:
      - ./secrets/user-service/.env
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - gateway-network
      - user-db-network
    ports:
      - "3001:3001"
    restart: unless-stopped

  user-db:
    image: postgres:16-alpine
    container_name: peerprep-user-postgres
    env_file:
      - ./secrets/user-db/.env
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - user-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  matching-service:
    build: ./backend/services/matchingService
    container_name: matching-service
    env_file:
      - ./secrets/matching-service/.env
    depends_on:
      user-service:
        condition: service_started
      questions-service:
        condition: service_started
      matching-redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway-network
      - matching-redis-network
      - rabbitmq-network
    ports:
      - "3002:3002"
    volumes:
      - ./secrets:/secrets:ro
    restart: unless-stopped

  matching-redis:
    image: redis:latest
    container_name: matching-redis
    restart: unless-stopped
    networks:
      - matching-redis-network

  questions-service:
    build: ./backend/services/questionService
    container_name: questions-service
    env_file:
      - ./secrets/questions-service/.env
    ports:
      - "3005:3005"
    volumes:
      - ./question-upload-key.json:/secrets/question-upload-key.json:ro
    depends_on:
      - cloudsql-proxy
    networks:
      - gateway-network
      - questions-db-network
    restart: unless-stopped

  questions-db:
    image: postgres:16-alpine
    container_name: questions-db
    ports:
      - "5435:5432"
    env_file:
      - ./secrets/questions-db/.env
    volumes:
      - questions_data:/var/lib/postgresql
    networks:
      - questions-db-network
    restart: unless-stopped

  cloudsql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "cs3219-491608:asia-southeast1:questions-db"
    volumes:
      - ./secrets/cloudsql-proxy/gcp-key.json:/secrets/gcp-key.json:ro
    env_file:
      - ./secrets/cloudsql-proxy/.env
    networks:
      - questions-db-network

  collaboration-service:
    build: ./backend/services/collaborationService
    env_file:
      - ./secrets/collaboration-service/.env
    depends_on:
      collaboration-redis:
        condition: service_started
      user-service:
        condition: service_started
      questions-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway-network
      - collaboration-redis-network
      - rabbitmq-network
    ports:
      - "3003:3003"
    restart: unless-stopped

  collaboration-redis:
    image: redis:latest
    container_name: collaboration-redis
    restart: unless-stopped
    networks:
      - collaboration-redis-network

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston
    privileged: true
    env_file:
      - ./secrets/piston/.env
    volumes:
      - piston_data:/piston
    networks:
      - gateway-network
    ports:
      - "2000:2000"
    restart: unless-stopped

  execution-service:
    build: ./backend/services/executionService
    container_name: execution-service
    env_file:
      - ./secrets/execution-service/.env
    depends_on:
      piston:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway-network
      - rabbitmq-network
    ports:
      - "3006:3006"
    restart: unless-stopped

  attempts-service:
    build:
      context: ./backend/services/attemptService
      dockerfile: Dockerfile
    container_name: attempts-service
    env_file:
      - ./secrets/attempts-service/.env
    depends_on:
      attempts-db:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - gateway-network
      - attempts-db-network
    ports:
      - "3004:3004"
    restart: unless-stopped

  attempts-db:
    image: postgres:16-alpine
    container_name: attempts-db
    env_file:
      - ./secrets/attempts-db/.env
    ports:
      - "5436:5432"
    volumes:
      - attempts_data:/var/lib/postgresql/data
    networks:
      - attempts-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep_attempt"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  message-service:
    build: ./backend/services/messageService
    container_name: message-service
    env_file:
      - ./secrets/message-service/.env
    ports:
      - "3019:3019"
    depends_on:
      message-redis:
        condition: service_started
    networks:
      - gateway-network
      - message-network
    restart: unless-stopped

  message-redis:
    image: redis:latest
    container_name: message-redis
    restart: unless-stopped
    networks:
      - message-network
      
  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: peerprep-rabbitmq
    ports:
      - "5672:5672" # AMQP protocol port (for your Node app)
      - "15672:15672" # Management UI (username: guest / password: guest)
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rabbitmq-network

volumes:
  user_data:
  matching_data:
  questions_data:
  attempts_data:
  piston_data:

networks:
  gateway-network:
    driver: bridge
  user-db-network:
    driver: bridge
  matching-redis-network:
    driver: bridge
  questions-db-network:
    driver: bridge
  collaboration-redis-network:
    driver: bridge
  attempts-db-network:
    driver: bridge
  rabbitmq-network:
    driver: bridge
  message-network:
    driver: bridge
