services:
  # Frontend
  frontend:
    build: ./frontend
    container_name: peerprep-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - gateway
    networks:
      - gateway-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # API Gateway (nginx)
  gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - matching-service
      - questions-service
      - attempts-service
      - collaboration-service
    networks:
      - gateway-network
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: peerprep-ngrok
    depends_on:
      - gateway
    env_file:
      - ./.env
    command: http --url=nonjuridical-unflaunting-hudson.ngrok-free.dev --pooling-enabled=true gateway:8080
    ports:
      - "4040:4040"
    networks:
      - gateway-network
    restart: unless-stopped

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 8888:8080
    depends_on:
      - gateway
    environment:
      - DOZZLE_LEVEL=info

  #   # Message Broker (RabbitMQ)
  #   rabbitmq:
  #     image: rabbitmq:latest
  #     container_name: rabbitmq
  #     hostname: rabbitmq
  #     networks:
  #       - gateway-network
  #     healthcheck:
  #       test: rabbitmq-diagnostics check_port_connectivity
  #       interval: 30s
  #       timeout: 30s
  #       retries: 10
  #       start_period: 30s
  #     restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./backend/services/userService
      dockerfile: Dockerfile
    container_name: peerprep-user-service
    env_file:
      - ./backend/services/userService/.env
    environment:
      DATABASE_URI: postgresql://postgres:postgres@user-db:5432/peerprep_user
      PORT: 3001
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - gateway-network
      - user-db-network
    ports:
      - "3001:3001"
    restart: unless-stopped

  user-db:
    image: postgres:16-alpine
    container_name: peerprep-user-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerprep_user
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - user-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Matching Service
  matching-service:
    build: ./backend/services/matchingService
    container_name: matching-service
    env_file:
      - ./backend/services/matchingService/.env
    depends_on:
      user-service:
        condition: service_started
      questions-service:
        condition: service_started
      matching-redis:
        condition: service_started
    networks:
      - gateway-network
      - matching-redis-network
    ports:
      - "3002:3002"
    environment:
      - MS_SERVER_PORT=3002
      - MS_ENV=development
      - MS_REDIS_URL=redis://matching-redis:6379
      - US_INTERNAL_SERVICE_URL=http://user-service:3001
      - MS_COLLABORATION_SERVICE_URL=http://collaboration-service:3003
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/peerprep-pubsub-key.json
    volumes:
      - ./secrets:/secrets:ro
    restart: unless-stopped

  matching-redis:
    image: redis:latest
    container_name: matching-redis
    restart: unless-stopped
    networks:
      - matching-redis-network

  # Questions Service
  questions-service:
    build: ./backend/services/questionService
    container_name: questions-service
    env_file:
      - ./backend/services/questionService/.env
    environment:
      - DB_HOST=questions-db
    ports:
      - "3005:3005"
    depends_on:
      questions-db:
        condition: service_started
    networks:
      - gateway-network
      - questions-db-network
    restart: unless-stopped

  questions-db:
    image: postgres:16-alpine
    container_name: questions-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: questions
    volumes:
      - questions_data:/var/lib/postgresql
    networks:
      - questions-db-network
    restart: unless-stopped

  pgadmin:
    container_name: container-pgadmin
    image: dpage/pgadmin4
    depends_on:
      - questions-db
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@gmail.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    networks:
      - questions-db-network
    restart: unless-stopped

  # Collaboration Service
  collaboration-service:
    build: ./backend/services/collaborationService
    env_file:
      - ./backend/services/collaborationService/.env
    environment:
      - CS_SERVER_PORT=3003
      - CS_API_GATEWAY_URL=http://gateway:8080
      - CS_REDIS_HOST=collaboration-redis
      - CS_REDIS_PORT=6379
      - CS_EXECUTION_SERVICE_URL=http://execution-service:3006
      - CS_ATTEMPT_SERVICE_URL=http://attempts-service:3004
    depends_on:
      collaboration-redis:
        condition: service_started
      user-service:
        condition: service_started
      questions-service:
        condition: service_started
    networks:
      - gateway-network
      - collaboration-redis-network
    ports:
      - "3003:3003"
    restart: unless-stopped

  collaboration-redis:
    image: redis:latest
    container_name: collaboration-redis
    restart: unless-stopped
    networks:
      - collaboration-redis-network

  # Piston Code Execution Engine
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston
    privileged: true
    volumes:
      - piston_data:/piston
    environment:
      - PISTON_RUN_TIMEOUT=10000
      - PISTON_RUN_MEMORY_LIMIT=134217728
      - PISTON_COMPILE_TIMEOUT=15000
      - PISTON_DISABLE_NETWORKING=true
      - PISTON_OUTPUT_MAX_SIZE=65536
    networks:
      - gateway-network
    ports:
      - "2000:2000"
    restart: unless-stopped

  # Execution Service (Piston adapter)
  execution-service:
    build: ./backend/services/executionService
    container_name: execution-service
    env_file:
      - ./backend/services/executionService/.env
    environment:
      - PISTON_URL=http://piston:2000
    depends_on:
      - piston
    networks:
      - gateway-network
    ports:
      - "3006:3006"
    restart: unless-stopped

  # Attempts Service
  attempts-service:
    build:
      context: ./backend/services/attemptService
      dockerfile: Dockerfile
    container_name: attempts-service
    env_file:
      - ./backend/services/attemptService/.env
    environment:
      DATABASE_URI: postgresql://postgres:postgres@attempts-db:5432/peerprep_attempt
      PORT: 3004
      USER_SERVICE_URL: http://user-service:3001
    depends_on:
      attempts-db:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - gateway-network
      - attempts-db-network
    ports:
      - "3004:3004"
    restart: unless-stopped

  attempts-db:
    image: postgres:16-alpine
    container_name: attempts-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerprep_attempt
    ports:
      - "5436:5432"
    volumes:
      - attempts_data:/var/lib/postgresql/data
    networks:
      - attempts-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep_attempt"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  user_data:
  matching_data:
  questions_data:
  attempts_data:
  piston_data:

networks:
  gateway-network:
    driver: bridge
  user-db-network:
    driver: bridge
  matching-redis-network:
    driver: bridge
  questions-db-network:
    driver: bridge
  collaboration-redis-network:
    driver: bridge
  attempts-db-network:
    driver: bridge
