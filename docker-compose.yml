  #     attempts-db:
  #       condition: service_started
  #   networks:
  #     - gateway-network
  #     - attempts-db-network
  #   volumes:
  #     - ./peer2prep-backend/services/attemptService:/app
  #     - /app/node_modules
  #   restart: unless-stopped

  # attempts-db:
  #   image: mongo:latest
  #   container_name: attempts-db
  #   volumes:
  #     - attempts_data:/data/db
  #   networks:
  #     - attempts-db-network
  #   restart: unless-stopped

volumes:
  user_data:
  matching_data:
  questions_data:
  collaboration_data:
  attempts_data:
  redis_data:

networks:
  gateway-network:
    driver: bridge
  user-db-network:
    driver: bridge
  matching-redis-network:
    driver: bridge
  questions-db-network:
    driver: bridge
  collaboration-db-network:
    driver: bridge
  collaboration-redis-network:
    driver: bridge
  attempts-db-network:
    driver: bridge
