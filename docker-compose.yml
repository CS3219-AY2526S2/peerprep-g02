services:
  # Frontend
  frontend:
    build: ./peer2prep-frontend
    container_name: peer2prep-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./peer2prep-frontend/.env
    depends_on:
      - gateway
    networks:
      - gateway-network
    volumes:
      - ./peer2prep-frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # API Gateway (nginx)
  gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./ngnix/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - matching-service
      - questions-service
      - collaboration-service
    networks:
      - gateway-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network
    restart: unless-stopped

  # User Service
  user-service:
    build: ./peer2prep-backend/services/userService
    container_name: user-service
    env_file:
      - ./peer2prep-backend/services/userService/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      user-db:
        condition: service_started
    networks:
      - gateway-network
      - user-db-network
    volumes:
      - ./peer2prep-backend/services/userService:/app
      - /app/node_modules
    environment:
      - PORT=3001
      - API_BASE_URI=http://user-service
      - DATABASE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@user-db:5432/peer2prep_user
    restart: unless-stopped

  user-db:
    image: postgres
    container_name: user-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=peer2prep_user
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - user-db-network
    restart: unless-stopped

  # Matching Service
  matching-service:
    build: ./peer2prep-backend/services/matchingService
    container_name: matching-service
    env_file:
      - ./peer2prep-backend/services/matchingService/.env
    depends_on:
      matching-redis:
        condition: service_started
    networks:
      - gateway-network
      - matching-redis-network
    ports:
      - "3007:5002"
    environment:
      - MS_SERVER_PORT=5002
      - MS_ENV=development
      - MS_REDIS_URL=redis://matching-redis:6379
    restart: unless-stopped

  matching-redis:
    image: redis:latest
    container_name: matching-redis
    restart: unless-stopped
    networks:
      - matching-redis-network

  # Questions Service
  questions-service:
    build: ./peer2prep-backend/services/questionService
    container_name: questions-service
    env_file:
      - ./peer2prep-backend/services/questionService/.env
    ports:
    - "3005:3005"
    depends_on:
      rabbitmq:
        condition: service_healthy
      questions-db:
        condition: service_started
    networks:
      - gateway-network
      - questions-db-network
    volumes:
      - ./peer2prep-backend/services/questionService:/app
      - /app/node_modules
    restart: unless-stopped

  questions-db:
    image: postgres
    container_name: questions-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=questions_db
    volumes:
      - questions_data:/var/lib/postgresql/data
    networks:
      - questions-db-network
    restart: unless-stopped
  pgadmin:
    container_name: container-pgadmin
    image: dpage/pgadmin4
    depends_on:
      - questions-db
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    networks:
      - questions-db-network
    restart: unless-stopped
  # Collaboration Service
  collaboration-service:
    build: ./peer2prep-backend/services/collaborationService
    container_name: collaboration-service
    env_file:
      - ./peer2prep-backend/services/collaborationService/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      collaboration-db:
        condition: service_started
      collaboration-redis:
        condition: service_started
    networks:
      - gateway-network
      - collaboration-db-network
      - collaboration-redis-network
    volumes:
      - ./peer2prep-backend/services/collaborationService:/app
      - /app/node_modules
    environment:
      - CS_SERVER_PORT=3004
      - CS_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@collaboration-db:5432/collaboration_db
      - CS_REDIS_URL=redis://collaboration-redis:6379
    restart: unless-stopped

  collaboration-db:
    image: postgres
    container_name: collaboration-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=collaboration_db
    volumes:
      - collaboration_data:/var/lib/postgresql/data
    networks:
      - collaboration-db-network
    restart: unless-stopped

  collaboration-redis:
    image: redis:latest
    container_name: collaboration-redis
    restart: unless-stopped
    networks:
      - collaboration-redis-network

  # # Attempts Service
