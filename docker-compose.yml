services:
  # Frontend
  frontend:
    build: ./peer2prep-frontend
    container_name: peerprep-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./peer2prep-frontend/.env
    depends_on:
      - gateway
    networks:
      - gateway-network
    volumes:
      - ./peer2prep-frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # API Gateway (nginx)
  gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      # - matching-service
      # - questions-service
      # - collaboration-service
      # - attempts-service
    networks:
      - gateway-network
    restart: unless-stopped

#   # Message Broker (RabbitMQ)
#   rabbitmq:
#     image: rabbitmq:latest
#     container_name: rabbitmq
#     hostname: rabbitmq
#     networks:
#       - gateway-network
#     healthcheck:
#       test: rabbitmq-diagnostics check_port_connectivity
#       interval: 30s
#       timeout: 30s
#       retries: 10
#       start_period: 30s
#     restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./peer2prep-backend/services/userService
      dockerfile: Dockerfile
    container_name: peerprep-user-service
    env_file:
      - ./peer2prep-backend/services/userService/.env
    environment:
      DATABASE_URI: postgresql://postgres:postgres@user-db:5432/peerprep_user
      PORT: 3001
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - gateway-network
      - user-db-network
    ports:
      - "3001:3001"
    restart: unless-stopped

  user-db:
    image: postgres:16-alpine
    container_name: peerprep-user-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerprep_user
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - user-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Matching Service
  matching-service:
    build: ./peer2prep-backend/services/matchingService
    container_name: matching-service
    env_file:
      - ./peer2prep-backend/services/matchingService/.env
    depends_on:
      matching-redis:
        condition: service_started
    networks:
      - gateway-network
      - matching-redis-network
    ports:
      - "3007:5002"
    environment:
      - MS_SERVER_PORT=5002
      - MS_ENV=development
      - MS_REDIS_URL=redis://matching-redis:6379
    restart: unless-stopped

  matching-redis:
    image: redis:latest
    container_name: matching-redis
    restart: unless-stopped
    networks:
      - matching-redis-network

  # Questions Service
  questions-service:
    build: ./peer2prep-backend/services/questionService
    container_name: questions-service
    env_file:
      - ./peer2prep-backend/services/questionService/.env
    ports:
    - "3005:3005"
    depends_on:
      questions-db:
        condition: service_started
    networks:
      - gateway-network
      - questions-db-network
    volumes:
      - ./peer2prep-backend/services/questionService:/app
      - /app/node_modules
    restart: unless-stopped

  questions-db:
    image: postgres:16-alpine
    container_name: questions-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: questions
    volumes:
      - questions_data:/var/lib/postgresql
    networks:
      - questions-db-network
    restart: unless-stopped

  pgadmin:
    container_name: container-pgadmin
    image: dpage/pgadmin4
    depends_on:
      - questions-db
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@gmail.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    networks:
      - questions-db-network
    restart: unless-stopped

