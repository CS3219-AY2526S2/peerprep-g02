<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #1a1a2e; }
      .actor-label { font-size: 13px; font-weight: 600; fill: #fff; }
      .msg-label { font-size: 11px; fill: #333; }
      .msg-detail { font-size: 10px; fill: #666; font-style: italic; }
      .note { font-size: 10px; fill: #555; }
      .protocol { font-size: 9px; font-weight: 600; fill: #888; }
      .lifeline { stroke: #ccc; stroke-width: 1; stroke-dasharray: 6,4; }
      .arrow { stroke: #444; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-redis { stroke: #3d8b3d; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-green); }
      .arrow-return { stroke: #999; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowhead-grey); }
      .arrow-return-redis { stroke: #7dba7d; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowhead-green-light); }
      .arrow-http { stroke: #5a6abf; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-blue); }
      .arrow-return-http { stroke: #9aa2d4; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowhead-blue-light); }
      .arrow-ws { stroke: #c75530; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-orange); }
      .step-num { font-size: 11px; font-weight: 700; fill: #fff; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
    <marker id="arrowhead-grey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3d8b3d"/>
    </marker>
    <marker id="arrowhead-green-light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7dba7d"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a6abf"/>
    </marker>
    <marker id="arrowhead-blue-light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9aa2d4"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c75530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" rx="12" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="40" y="42" class="title">Session Join Flow</text>

  <!-- Legend -->
  <rect x="560" y="14" width="420" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <line x1="575" y1="32" x2="610" y2="32" class="arrow-ws" stroke-width="2"/>
  <text x="616" y="36" class="protocol">WebSocket event</text>
  <line x1="720" y1="32" x2="755" y2="32" class="arrow-redis" stroke-width="2"/>
  <text x="761" y="36" class="protocol">Redis (ioredis TCP)</text>
  <line x1="880" y1="32" x2="915" y2="32" class="arrow-http" stroke-width="2"/>
  <text x="921" y="36" class="protocol">HTTP</text>
  <line x1="575" y1="50" x2="610" y2="50" class="arrow-return" stroke-width="1.5"/>
  <text x="616" y="54" class="protocol">Response / return</text>

  <!-- Actor boxes -->
  <rect x="40" y="75" width="100" height="36" rx="18" fill="#e86540"/>
  <text x="90" y="98" text-anchor="middle" class="actor-label">Frontend</text>

  <rect x="230" y="75" width="100" height="36" rx="18" fill="#4ba886"/>
  <text x="280" y="98" text-anchor="middle" class="actor-label">Collab</text>

  <rect x="430" y="75" width="100" height="36" rx="18" fill="#5bb85b"/>
  <text x="480" y="98" text-anchor="middle" class="actor-label">Redis</text>

  <rect x="620" y="75" width="100" height="36" rx="18" fill="#6474b6"/>
  <text x="670" y="98" text-anchor="middle" class="actor-label">User Svc</text>

  <rect x="810" y="75" width="120" height="36" rx="18" fill="#9066b0"/>
  <text x="870" y="98" text-anchor="middle" class="actor-label">Question Svc</text>

  <!-- Lifelines -->
  <line x1="90" y1="111" x2="90" y2="690" class="lifeline"/>
  <line x1="280" y1="111" x2="280" y2="690" class="lifeline"/>
  <line x1="480" y1="111" x2="480" y2="690" class="lifeline"/>
  <line x1="670" y1="111" x2="670" y2="690" class="lifeline"/>
  <line x1="870" y1="111" x2="870" y2="690" class="lifeline"/>

  <!-- Step 1: emit session:join (WebSocket) -->
  <circle cx="26" cy="150" r="11" fill="#e86540"/>
  <text x="26" y="154" text-anchor="middle" class="step-num">1</text>
  <line x1="90" y1="150" x2="272" y2="150" class="arrow-ws"/>
  <text x="130" y="143" class="msg-label">emit session:join</text>
  <text x="130" y="162" class="msg-detail">{ collaborationId }</text>

  <!-- Step 2: Validate session in Redis (TCP) -->
  <circle cx="26" cy="202" r="11" fill="#4ba886"/>
  <text x="26" y="206" text-anchor="middle" class="step-num">2</text>
  <line x1="280" y1="202" x2="472" y2="202" class="arrow-redis"/>
  <text x="310" y="195" class="msg-label">HGETALL session + presence checks</text>
  <text x="310" y="214" class="msg-detail">validate: exists, active, user assigned, not left, grace period</text>
  <line x1="480" y1="224" x2="288" y2="224" class="arrow-return-redis"/>

  <!-- Step 3: Register socket (TCP) -->
  <circle cx="26" cy="262" r="11" fill="#4ba886"/>
  <text x="26" y="266" text-anchor="middle" class="step-num">3</text>
  <line x1="280" y1="262" x2="472" y2="262" class="arrow-redis"/>
  <text x="310" y="255" class="msg-label">HSET socket:{id} + SADD presence sockets</text>
  <text x="310" y="274" class="msg-detail">register socket connection, track socketCount</text>

  <!-- Step 4: Read OT document (TCP) -->
  <circle cx="26" cy="312" r="11" fill="#4ba886"/>
  <text x="26" y="316" text-anchor="middle" class="step-num">4</text>
  <line x1="280" y1="312" x2="472" y2="312" class="arrow-redis"/>
  <text x="310" y="305" class="msg-label">GET ot:{id}:content + GET ot:{id}:revision</text>
  <text x="310" y="324" class="msg-detail">read current code snapshot</text>
  <line x1="480" y1="334" x2="288" y2="334" class="arrow-return-redis"/>

  <!-- Step 5: Fetch question details (HTTP) -->
  <circle cx="26" cy="376" r="11" fill="#9066b0"/>
  <text x="26" y="380" text-anchor="middle" class="step-num">5</text>
  <line x1="280" y1="376" x2="862" y2="376" class="arrow-http"/>
  <text x="460" y="369" class="msg-label">POST /internal/get  { questionId }</text>
  <text x="460" y="388" class="msg-detail">fetch question description + test cases (x-internal-service-key)</text>
  <line x1="870" y1="398" x2="288" y2="398" class="arrow-return-http"/>

  <!-- Step 6: Cache question details (TCP) -->
  <circle cx="26" cy="436" r="11" fill="#5bb85b"/>
  <text x="26" y="440" text-anchor="middle" class="step-num">6</text>
  <line x1="280" y1="436" x2="472" y2="436" class="arrow-redis"/>
  <text x="310" y="429" class="msg-label">HSET question details (if first connection)</text>
  <text x="310" y="448" class="msg-detail">cache title, description, testCases, functionName</text>

  <!-- Step 7: Get user names (HTTP) -->
  <circle cx="26" cy="491" r="11" fill="#6474b6"/>
  <text x="26" y="495" text-anchor="middle" class="step-num">7</text>
  <line x1="280" y1="491" x2="662" y2="491" class="arrow-http"/>
  <text x="370" y="484" class="msg-label">POST /users/internal/validation/batch</text>
  <text x="370" y="503" class="msg-detail">resolve display names for both users (x-internal-service-key)</text>
  <line x1="670" y1="513" x2="288" y2="513" class="arrow-return-http"/>

  <!-- Step 8: Read hints (TCP) -->
  <circle cx="26" cy="550" r="11" fill="#5bb85b"/>
  <text x="26" y="554" text-anchor="middle" class="step-num">8</text>
  <line x1="280" y1="550" x2="472" y2="550" class="arrow-redis"/>
  <text x="310" y="543" class="msg-label">LRANGE hints:{id} + GET hints:count:{id}:{userId}</text>
  <text x="310" y="562" class="msg-detail">read existing hints + remaining count</text>
  <line x1="480" y1="570" x2="288" y2="570" class="arrow-return-redis"/>

  <!-- Step 9: ACK to frontend (WebSocket) -->
  <circle cx="26" cy="612" r="11" fill="#e86540"/>
  <text x="26" y="616" text-anchor="middle" class="step-num">9</text>
  <line x1="280" y1="612" x2="98" y2="612" class="arrow-ws"/>
  <text x="110" y="605" class="msg-label">ACK { session, question, codeSnapshot,</text>
  <text x="110" y="622" class="msg-label">revision, participants, hints, userNames }</text>

  <!-- Step 10: Broadcast -->
  <rect x="100" y="645" width="230" height="22" rx="4" fill="#fff3e0" stroke="#c75530" stroke-width="1"/>
  <text x="215" y="660" text-anchor="middle" class="note">Broadcast user:joined + presence:updated to room (WebSocket)</text>
</svg>