<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 11px; fill: #666; }
      .state-label { font-size: 14px; font-weight: 700; fill: #fff; }
      .state-detail { font-size: 10px; fill: #fff; opacity: 0.9; }
      .trans-label { font-size: 10px; font-weight: 600; fill: #333; }
      .trans-detail { font-size: 9px; fill: #666; font-style: italic; }
      .event-tag { font-size: 8.5px; font-weight: 600; }
      .note { font-size: 9.5px; fill: #555; }
      .note-bold { font-size: 9.5px; fill: #555; font-weight: 600; }
      .section-label { font-size: 10px; font-weight: 600; fill: #888; letter-spacing: 0.5px; }
    </style>
    <!-- Arrow markers -->
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3d8b3d"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c78a20"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c75530"/>
    </marker>
    <marker id="arr-grey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7b61a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="680" rx="12" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="40" y="36" class="title">User Presence State Machine</text>
  <text x="40" y="52" class="subtitle">Per-user presence within a collaboration session (multi-tab aware via socketCount)</text>

  <!-- Legend -->
  <rect x="520" y="10" width="380" height="54" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="534" y="27" class="section-label">SOCKET EVENTS EMITTED</text>
  <rect x="534" y="33" width="8" height="8" rx="2" fill="#c75530"/>
  <text x="548" y="41" class="event-tag" fill="#c75530">user:joined</text>
  <rect x="620" y="33" width="8" height="8" rx="2" fill="#e8a030"/>
  <text x="634" y="41" class="event-tag" fill="#c78a20">user:disconnected</text>
  <rect x="740" y="33" width="8" height="8" rx="2" fill="#d45b5b"/>
  <text x="754" y="41" class="event-tag" fill="#d45b5b">user:left</text>
  <rect x="534" y="48" width="8" height="8" rx="2" fill="#5a6abf"/>
  <text x="548" y="56" class="event-tag" fill="#5a6abf">presence:updated (broadcast on every transition)</text>

  <!-- ================================================================ -->
  <!-- STATE: Initial (entry point) -->
  <!-- ================================================================ -->
  <circle cx="100" cy="170" r="14" fill="#888" stroke="#666" stroke-width="2"/>
  <text x="100" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">new</text>

  <!-- ================================================================ -->
  <!-- STATE: CONNECTED -->
  <!-- ================================================================ -->
  <rect x="220" y="120" width="220" height="100" rx="14" fill="#3d8b3d"/>
  <text x="330" y="153" text-anchor="middle" class="state-label">CONNECTED</text>
  <text x="330" y="168" text-anchor="middle" class="state-detail">socketCount &gt;= 1</text>
  <line x1="250" y1="180" x2="410" y2="180" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <text x="330" y="195" text-anchor="middle" class="state-detail">status: "connected"</text>
  <text x="330" y="208" text-anchor="middle" class="state-detail">lastActivityTime tracked</text>

  <!-- ================================================================ -->
  <!-- STATE: DISCONNECTED -->
  <!-- ================================================================ -->
  <rect x="220" y="340" width="220" height="100" rx="14" fill="#e8a030"/>
  <text x="330" y="373" text-anchor="middle" class="state-label">DISCONNECTED</text>
  <text x="330" y="388" text-anchor="middle" class="state-detail">socketCount == 0</text>
  <line x1="250" y1="400" x2="410" y2="400" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <text x="330" y="415" text-anchor="middle" class="state-detail">status: "disconnected"</text>
  <text x="330" y="428" text-anchor="middle" class="state-detail">lastDisconnectTime set</text>

  <!-- ================================================================ -->
  <!-- STATE: LEFT -->
  <!-- ================================================================ -->
  <rect x="600" y="340" width="220" height="100" rx="14" fill="#d45b5b"/>
  <text x="710" y="373" text-anchor="middle" class="state-label">LEFT</text>
  <text x="710" y="388" text-anchor="middle" class="state-detail">socketCount == 0 (permanent)</text>
  <line x1="630" y1="400" x2="790" y2="400" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <text x="710" y="415" text-anchor="middle" class="state-detail">status: "left"</text>
  <text x="710" y="428" text-anchor="middle" class="state-detail">added to left:{collabId} set</text>

  <!-- ================================================================ -->
  <!-- STATE: SESSION ENDED -->
  <!-- ================================================================ -->
  <rect x="380" y="560" width="220" height="80" rx="14" fill="#666"/>
  <text x="490" y="593" text-anchor="middle" class="state-label">SESSION ENDED</text>
  <line x1="410" y1="605" x2="570" y2="605" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <text x="490" y="620" text-anchor="middle" class="state-detail">All Redis keys cleaned up</text>
  <text x="490" y="633" text-anchor="middle" class="state-detail">emit session:ended to room</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Initial -> Connected (first join) -->
  <!-- ================================================================ -->
  <line x1="114" y1="170" x2="212" y2="170" stroke="#3d8b3d" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <text x="127" y="163" class="trans-label" fill="#3d8b3d">session:join</text>
  <text x="127" y="183" class="trans-detail">socketCount: 0 -> 1</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Connected -> Connected (new tab) — self-loop at top -->
  <!-- ================================================================ -->
  <path d="M 360 120 C 360 75, 420 75, 420 120" stroke="#3d8b3d" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <text x="355" y="85" class="trans-label" fill="#3d8b3d">Open new tab</text>
  <text x="355" y="97" class="trans-detail">socketCount++ (session:join)</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Connected -> Connected (close one tab, others remain) — self-loop right -->
  <!-- ================================================================ -->
  <path d="M 440 150 C 500 140, 500 190, 440 180" stroke="#c78a20" stroke-width="1.5" fill="none" marker-end="url(#arr-amber)"/>
  <text x="480" y="148" class="trans-label" fill="#c78a20">Close 1 tab</text>
  <text x="480" y="160" class="trans-detail">socketCount-- (still > 0)</text>
  <text x="480" y="172" class="trans-detail">stays CONNECTED</text>
  <text x="480" y="184" class="trans-detail">no event emitted to room</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Connected -> Disconnected (last socket closes) -->
  <!-- ================================================================ -->
  <line x1="310" y1="220" x2="310" y2="332" stroke="#c78a20" stroke-width="1.5" fill="none" marker-end="url(#arr-amber)"/>
  <text x="195" y="262" class="trans-label" fill="#c78a20">Last socket closes</text>
  <text x="195" y="274" class="trans-detail">socketCount: 1 -> 0</text>
  <text x="195" y="286" class="trans-detail">emit user:disconnected</text>
  <text x="195" y="298" class="trans-detail">3 min grace period starts</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Disconnected -> Connected (reconnect within grace) -->
  <!-- ================================================================ -->
  <line x1="350" y1="340" x2="350" y2="228" stroke="#3d8b3d" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <text x="356" y="262" class="trans-label" fill="#3d8b3d">Reconnect</text>
  <text x="356" y="274" class="trans-detail">within 3 min grace</text>
  <text x="356" y="286" class="trans-detail">socketCount: 0 -> 1</text>
  <text x="356" y="298" class="trans-detail">emit user:joined</text>
  <text x="356" y="310" class="trans-detail">(wasDisconnected: true)</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Connected -> Left (explicit session:leave, last tab) -->
  <!-- ================================================================ -->
  <line x1="440" y1="195" x2="600" y2="355" stroke="#d45b5b" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <text x="510" y="248" class="trans-label" fill="#d45b5b">session:leave</text>
  <text x="510" y="260" class="trans-detail">(last tab only)</text>
  <text x="510" y="272" class="trans-detail">removes all user sockets</text>
  <text x="510" y="284" class="trans-detail">emit user:left</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Disconnected -> Left (grace period expired) -->
  <!-- ================================================================ -->
  <line x1="440" y1="395" x2="592" y2="395" stroke="#d45b5b" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <text x="460" y="385" class="trans-label" fill="#d45b5b">Grace period expires (3 min)</text>
  <text x="460" y="410" class="trans-detail">rejoin blocked, active-session index cleared</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Left -> Session Ended (both users left or other disconnected) -->
  <!-- ================================================================ -->
  <line x1="680" y1="440" x2="560" y2="560" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arr-grey)"/>
  <text x="630" y="488" class="trans-label" fill="#666">Both users LEFT</text>
  <text x="630" y="500" class="trans-detail">or other user DISCONNECTED</text>

  <!-- ================================================================ -->
  <!-- TRANSITION: Disconnected -> Session Ended (inactivity timeout) -->
  <!-- ================================================================ -->
  <line x1="300" y1="440" x2="420" y2="560" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arr-grey)"/>
  <text x="275" y="498" class="trans-label" fill="#666">Inactivity timeout</text>
  <text x="275" y="510" class="trans-detail">30 min, checked every 60s</text>
  <text x="275" y="522" class="trans-detail">distributed Redis lock</text>

  <!-- ================================================================ -->
  <!-- Multi-tab detail box -->
  <!-- ================================================================ -->
  <rect x="30" y="460" width="200" height="110" rx="6" fill="#fff" stroke="#3d8b3d" stroke-width="1"/>
  <text x="130" y="478" text-anchor="middle" class="note-bold" fill="#3d8b3d">Multi-Tab Behavior</text>
  <line x1="45" y1="484" x2="215" y2="484" stroke="#3d8b3d" stroke-width="0.5" opacity="0.3"/>
  <text x="45" y="498" class="note">Each browser tab = 1 socket</text>
  <text x="45" y="512" class="note">socketCount tracks open tabs</text>
  <text x="45" y="526" class="note">Closing 1 tab: socketCount--</text>
  <text x="45" y="540" class="note">Only last close triggers</text>
  <text x="45" y="554" class="note">DISCONNECTED transition</text>

  <!-- ================================================================ -->
  <!-- Grace period detail box -->
  <!-- ================================================================ -->
  <rect x="670" y="460" width="220" height="110" rx="6" fill="#fff" stroke="#e8a030" stroke-width="1"/>
  <text x="780" y="478" text-anchor="middle" class="note-bold" fill="#c78a20">Reconnection Window</text>
  <line x1="685" y1="484" x2="875" y2="484" stroke="#e8a030" stroke-width="0.5" opacity="0.3"/>
  <text x="685" y="498" class="note">Grace period: 3 minutes</text>
  <text x="685" y="512" class="note">(DISCONNECT_GRACE_MS)</text>
  <text x="685" y="526" class="note">Reconnect returns full state</text>
  <text x="685" y="540" class="note">with wasDisconnected: true</text>
  <text x="685" y="554" class="note">After expiry: REJOIN_GRACE_</text>
  <text x="685" y="566" class="note">PERIOD_EXPIRED error</text>

  <!-- ================================================================ -->
  <!-- Session end triggers box -->
  <!-- ================================================================ -->
  <rect x="30" y="592" width="310" height="68" rx="6" fill="#fff" stroke="#888" stroke-width="1"/>
  <text x="185" y="610" text-anchor="middle" class="note-bold" fill="#666">Session End Triggers</text>
  <line x1="45" y1="616" x2="325" y2="616" stroke="#888" stroke-width="0.5" opacity="0.3"/>
  <text x="45" y="630" class="note">1. Both users LEFT  2. One LEFT + other DISCONNECTED</text>
  <text x="45" y="644" class="note">3. Inactivity timeout (30 min)  4. Programmatic endSession()</text>

  <!-- Startup reconciliation note -->
  <rect x="670" y="592" width="220" height="50" rx="6" fill="#fef3f3" stroke="#d45b5b" stroke-width="1"/>
  <text x="780" y="610" text-anchor="middle" class="note-bold" fill="#d45b5b">Startup Recovery</text>
  <line x1="685" y1="616" x2="875" y2="616" stroke="#d45b5b" stroke-width="0.5" opacity="0.3"/>
  <text x="685" y="630" class="note">reconcileOrphanedSockets() marks</text>
  <text x="685" y="642" class="note">all stale "connected" as "disconnected"</text>
</svg>
