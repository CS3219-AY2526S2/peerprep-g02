<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 740" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #1a1a2e; }
      .actor-label { font-size: 13px; font-weight: 600; fill: #fff; }
      .msg-label { font-size: 11px; fill: #333; }
      .msg-detail { font-size: 10px; fill: #666; font-style: italic; }
      .note { font-size: 10px; fill: #555; }
      .protocol { font-size: 9px; font-weight: 600; fill: #888; }
      .lifeline { stroke: #ccc; stroke-width: 1; stroke-dasharray: 6,4; }
      .arrow-ws { stroke: #c75530; stroke-width: 1.5; fill: none; marker-end: url(#ah-orange); }
      .arrow-redis { stroke: #3d8b3d; stroke-width: 1.5; fill: none; marker-end: url(#ah-green); }
      .arrow-return-redis { stroke: #7dba7d; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah-green-l); }
      .arrow-amqp { stroke: #c78a20; stroke-width: 1.5; fill: none; marker-end: url(#ah-amber); }
      .arrow-http { stroke: #5a6abf; stroke-width: 1.5; fill: none; marker-end: url(#ah-blue); }
      .arrow-return-http { stroke: #9aa2d4; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah-blue-l); }
      .arrow-return { stroke: #999; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah-grey); }
      .step-num { font-size: 11px; font-weight: 700; fill: #fff; }
      .divider { stroke: #bbb; stroke-width: 1; stroke-dasharray: 2,3; }
      .section-label { font-size: 11px; font-weight: 600; fill: #888; }
    </style>
    <marker id="ah-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c75530"/>
    </marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3d8b3d"/>
    </marker>
    <marker id="ah-green-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7dba7d"/>
    </marker>
    <marker id="ah-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c78a20"/>
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a6abf"/>
    </marker>
    <marker id="ah-blue-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9aa2d4"/>
    </marker>
    <marker id="ah-grey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="740" rx="12" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="40" y="42" class="title">Code Submit Flow</text>

  <!-- Legend -->
  <rect x="420" y="10" width="660" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <line x1="435" y1="30" x2="470" y2="30" class="arrow-ws" stroke-width="2"/>
  <text x="476" y="34" class="protocol">WebSocket</text>
  <line x1="545" y1="30" x2="580" y2="30" class="arrow-redis" stroke-width="2"/>
  <text x="586" y="34" class="protocol">Redis (ioredis TCP)</text>
  <line x1="700" y1="30" x2="735" y2="30" class="arrow-amqp" stroke-width="2"/>
  <text x="741" y="34" class="protocol">AMQP (RabbitMQ)</text>
  <line x1="855" y1="30" x2="890" y2="30" class="arrow-http" stroke-width="2"/>
  <text x="896" y="34" class="protocol">HTTP</text>
  <line x1="940" y1="30" x2="975" y2="30" class="arrow-return" stroke-width="1.5"/>
  <text x="981" y="34" class="protocol">Response</text>
  <line x1="435" y1="48" x2="660" y2="48" stroke="none"/>

  <!-- Actor boxes -->
  <rect x="30" y="72" width="95" height="36" rx="18" fill="#e86540"/>
  <text x="78" y="95" text-anchor="middle" class="actor-label">Frontend</text>

  <rect x="195" y="72" width="95" height="36" rx="18" fill="#4ba886"/>
  <text x="243" y="95" text-anchor="middle" class="actor-label">Collab</text>

  <rect x="370" y="72" width="100" height="36" rx="18" fill="#f59e42"/>
  <text x="420" y="95" text-anchor="middle" class="actor-label">RabbitMQ</text>

  <rect x="545" y="72" width="105" height="36" rx="18" fill="#d45b5b"/>
  <text x="598" y="95" text-anchor="middle" class="actor-label">Execution Svc</text>

  <rect x="720" y="72" width="80" height="36" rx="18" fill="#5bb85b"/>
  <text x="760" y="95" text-anchor="middle" class="actor-label">Redis</text>

  <rect x="860" y="72" width="95" height="36" rx="18" fill="#6474b6"/>
  <text x="908" y="95" text-anchor="middle" class="actor-label">Attempt Svc</text>

  <rect x="1005" y="72" width="75" height="36" rx="18" fill="#9066b0"/>
  <text x="1043" y="95" text-anchor="middle" class="actor-label">User Svc</text>

  <!-- Lifelines -->
  <line x1="78" y1="108" x2="78" y2="710" class="lifeline"/>
  <line x1="243" y1="108" x2="243" y2="710" class="lifeline"/>
  <line x1="420" y1="108" x2="420" y2="710" class="lifeline"/>
  <line x1="598" y1="108" x2="598" y2="710" class="lifeline"/>
  <line x1="760" y1="108" x2="760" y2="710" class="lifeline"/>
  <line x1="908" y1="108" x2="908" y2="710" class="lifeline"/>
  <line x1="1043" y1="108" x2="1043" y2="710" class="lifeline"/>

  <!-- Step 1: emit code:submit (WebSocket) -->
  <circle cx="18" cy="147" r="11" fill="#e86540"/>
  <text x="18" y="151" text-anchor="middle" class="step-num">1</text>
  <line x1="78" y1="147" x2="235" y2="147" class="arrow-ws"/>
  <text x="105" y="140" class="msg-label">emit code:submit { collaborationId }</text>

  <!-- Broadcast code:running -->
  <rect x="87" y="162" width="186" height="18" rx="3" fill="#fff3e0" stroke="#c75530" stroke-width="1"/>
  <text x="180" y="174" text-anchor="middle" class="note">Broadcast code:running to room (WebSocket)</text>

  <!-- Step 2: Fetch session + code from Redis (TCP) -->
  <circle cx="18" cy="205" r="11" fill="#5bb85b"/>
  <text x="18" y="209" text-anchor="middle" class="step-num">2</text>
  <line x1="243" y1="205" x2="752" y2="205" class="arrow-redis"/>
  <text x="370" y="198" class="msg-label">GET session, OT doc content, test cases, functionName</text>
  <line x1="760" y1="222" x2="251" y2="222" class="arrow-return-redis"/>

  <!-- Step 3: Publish to exec_req_queue (AMQP) -->
  <circle cx="18" cy="260" r="11" fill="#f59e42"/>
  <text x="18" y="264" text-anchor="middle" class="step-num">3</text>
  <line x1="243" y1="260" x2="412" y2="260" class="arrow-amqp"/>
  <text x="260" y="253" class="msg-label">Publish to exec_req_queue</text>
  <text x="260" y="275" class="msg-detail">{ correlationId, code, language, testCases, type: "submit" }</text>

  <!-- Step 3b: Set pending key (TCP) -->
  <line x1="243" y1="297" x2="752" y2="297" class="arrow-redis"/>
  <text x="370" y="290" class="msg-label">SET exec:pending:{correlationId} EX 65 (timeout safety net)</text>

  <!-- Step 4: Execution service consumes (AMQP) -->
  <circle cx="18" cy="335" r="11" fill="#d45b5b"/>
  <text x="18" y="339" text-anchor="middle" class="step-num">4</text>
  <line x1="420" y1="335" x2="590" y2="335" class="arrow-amqp"/>
  <text x="435" y="328" class="msg-label">Consume from exec_req_queue</text>
  <text x="435" y="349" class="msg-detail">Run code in Piston sandbox</text>

  <!-- Step 5: Execution service responds (AMQP) -->
  <circle cx="18" cy="385" r="11" fill="#d45b5b"/>
  <text x="18" y="389" text-anchor="middle" class="step-num">5</text>
  <line x1="598" y1="385" x2="428" y2="385" class="arrow-amqp"/>
  <text x="435" y="378" class="msg-label">Publish to exec_res_queue</text>
  <text x="435" y="399" class="msg-detail">{ results, testCasesPassed, totalTestCases }</text>

  <!-- Divider -->
  <line x1="20" y1="422" x2="1080" y2="422" class="divider"/>
  <text x="40" y="437" class="section-label">Response handling (Collab RabbitMQ consumer)</text>

  <!-- Step 6: Collab consumes response (AMQP) -->
  <circle cx="18" cy="465" r="11" fill="#4ba886"/>
  <text x="18" y="469" text-anchor="middle" class="step-num">6</text>
  <line x1="420" y1="465" x2="251" y2="465" class="arrow-amqp"/>
  <text x="260" y="458" class="msg-label">Consume from exec_res_queue</text>

  <!-- Step 6b: Clear pending key + store output (TCP) -->
  <line x1="243" y1="485" x2="752" y2="485" class="arrow-redis"/>
  <text x="370" y="478" class="msg-label">DEL exec:pending:{correlationId} + SET output</text>

  <!-- Step 6c: Broadcast output (WebSocket) -->
  <rect x="87" y="503" width="186" height="18" rx="3" fill="#e8f5e9" stroke="#4ba886" stroke-width="1"/>
  <text x="180" y="515" text-anchor="middle" class="note">Broadcast output:updated to room (WebSocket)</text>

  <!-- Step 7: Record attempt (HTTP, direct) -->
  <circle cx="18" cy="547" r="11" fill="#6474b6"/>
  <text x="18" y="551" text-anchor="middle" class="step-num">7</text>
  <line x1="243" y1="547" x2="900" y2="547" class="arrow-http"/>
  <text x="460" y="540" class="msg-label">POST /attempts (direct HTTP, x-internal-service-key)</text>
  <text x="460" y="560" class="msg-detail">{ userId, questionId, success, duration, testCasesPassed, totalTestCases }</text>

  <!-- Step 8: Attempt service updates score (HTTP) -->
  <circle cx="18" cy="597" r="11" fill="#9066b0"/>
  <text x="18" y="601" text-anchor="middle" class="step-num">8</text>
  <line x1="908" y1="597" x2="1035" y2="597" class="arrow-http"/>
  <text x="920" y="590" class="msg-label">POST /users/internal/deltas</text>
  <text x="920" y="612" class="msg-detail">score delta (+10/+30/+50 or -10)</text>
  <line x1="1043" y1="625" x2="916" y2="625" class="arrow-return-http"/>
  <text x="930" y="640" class="msg-detail">User Svc updates PostgreSQL (not Redis)</text>

  <!-- Step 9: submission:complete to submitter (WebSocket) -->
  <circle cx="18" cy="670" r="11" fill="#e86540"/>
  <text x="18" y="674" text-anchor="middle" class="step-num">9</text>
  <line x1="243" y1="670" x2="86" y2="670" class="arrow-ws"/>
  <text x="100" y="663" class="msg-label">emit submission:complete (submitter only)</text>
  <text x="100" y="682" class="msg-detail">{ success, testCasesPassed, totalTestCases }</text>
</svg>