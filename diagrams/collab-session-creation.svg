<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 780" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 12px; fill: #666; }
      .actor-label { font-size: 13px; font-weight: 600; fill: #fff; }
      .msg-label { font-size: 11px; fill: #333; }
      .msg-detail { font-size: 10px; fill: #666; font-style: italic; }
      .note { font-size: 10px; fill: #555; }
      .note-bold { font-size: 10px; fill: #555; font-weight: 600; }
      .protocol { font-size: 9px; font-weight: 600; fill: #888; }
      .lifeline { stroke: #ccc; stroke-width: 1; stroke-dasharray: 6,4; }
      .arrow-amqp { stroke: #c78a20; stroke-width: 1.5; fill: none; marker-end: url(#ah-amber); }
      .arrow-http { stroke: #5a6abf; stroke-width: 1.5; fill: none; marker-end: url(#ah-blue); }
      .arrow-return-http { stroke: #9aa2d4; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah-blue-l); }
      .arrow-redis { stroke: #3d8b3d; stroke-width: 1.5; fill: none; marker-end: url(#ah-green); }
      .arrow-ws { stroke: #c75530; stroke-width: 1.5; fill: none; marker-end: url(#ah-orange); }
      .arrow-return { stroke: #999; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah-grey); }
      .step-num { font-size: 11px; font-weight: 700; fill: #fff; }
    </style>
    <marker id="ah-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c78a20"/>
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a6abf"/>
    </marker>
    <marker id="ah-blue-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9aa2d4"/>
    </marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3d8b3d"/>
    </marker>
    <marker id="ah-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c75530"/>
    </marker>
    <marker id="ah-grey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1050" height="780" rx="12" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="40" y="40" class="title">Session Creation Flow</text>
  <text x="40" y="58" class="subtitle">Triggered when Matching Service finds a partner pair</text>

  <!-- Legend -->
  <rect x="500" y="12" width="530" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <line x1="515" y1="32" x2="550" y2="32" class="arrow-amqp" stroke-width="2"/>
  <text x="556" y="36" class="protocol">AMQP (RabbitMQ)</text>
  <line x1="672" y1="32" x2="707" y2="32" class="arrow-http" stroke-width="2"/>
  <text x="713" y="36" class="protocol">HTTP (internal)</text>
  <line x1="810" y1="32" x2="845" y2="32" class="arrow-redis" stroke-width="2"/>
  <text x="851" y="36" class="protocol">Redis (ioredis TCP)</text>
  <line x1="515" y1="50" x2="550" y2="50" class="arrow-ws" stroke-width="2"/>
  <text x="556" y="54" class="protocol">WebSocket</text>
  <line x1="640" y1="50" x2="675" y2="50" class="arrow-return" stroke-width="1.5"/>
  <text x="681" y="54" class="protocol">Response / return</text>

  <!-- Actor boxes -->
  <rect x="40" y="78" width="105" height="38" rx="19" fill="#e86540"/>
  <text x="93" y="102" text-anchor="middle" class="actor-label">Matching Svc</text>

  <rect x="225" y="78" width="105" height="38" rx="19" fill="#f59e42"/>
  <text x="278" y="102" text-anchor="middle" class="actor-label">RabbitMQ</text>

  <rect x="420" y="78" width="95" height="38" rx="19" fill="#4ba886"/>
  <text x="468" y="102" text-anchor="middle" class="actor-label">Collab Svc</text>

  <rect x="600" y="78" width="95" height="38" rx="19" fill="#6474b6"/>
  <text x="648" y="102" text-anchor="middle" class="actor-label">User Svc</text>

  <rect x="775" y="78" width="110" height="38" rx="19" fill="#9066b0"/>
  <text x="830" y="102" text-anchor="middle" class="actor-label">Question Svc</text>

  <rect x="950" y="78" width="70" height="38" rx="19" fill="#5bb85b"/>
  <text x="985" y="102" text-anchor="middle" class="actor-label">Redis</text>

  <!-- Lifelines -->
  <line x1="93" y1="116" x2="93" y2="750" class="lifeline"/>
  <line x1="278" y1="116" x2="278" y2="750" class="lifeline"/>
  <line x1="468" y1="116" x2="468" y2="750" class="lifeline"/>
  <line x1="648" y1="116" x2="648" y2="750" class="lifeline"/>
  <line x1="830" y1="116" x2="830" y2="750" class="lifeline"/>
  <line x1="985" y1="116" x2="985" y2="750" class="lifeline"/>

  <!-- Step 1: Matching publishes to req queue (AMQP) -->
  <circle cx="26" cy="158" r="12" fill="#e86540"/>
  <text x="26" y="162" text-anchor="middle" class="step-num">1</text>
  <line x1="93" y1="158" x2="270" y2="158" class="arrow-amqp"/>
  <text x="115" y="150" class="msg-label">Publish to collab_create_req_queue</text>
  <text x="115" y="170" class="msg-detail">{ matchId, userAId, userBId, difficulty, language, topic }</text>

  <!-- Step 2: Collab consumes from req queue (AMQP) -->
  <circle cx="26" cy="210" r="12" fill="#4ba886"/>
  <text x="26" y="214" text-anchor="middle" class="step-num">2</text>
  <line x1="278" y1="210" x2="460" y2="210" class="arrow-amqp"/>
  <text x="300" y="203" class="msg-label">Consume from collab_create_req_queue</text>
  <text x="300" y="223" class="msg-detail">validate payload schema</text>

  <!-- Step 3: Validate users via User Service (HTTP) -->
  <circle cx="26" cy="268" r="12" fill="#6474b6"/>
  <text x="26" y="272" text-anchor="middle" class="step-num">3</text>
  <line x1="468" y1="268" x2="640" y2="268" class="arrow-http"/>
  <text x="485" y="261" class="msg-label">POST /users/internal/validation/batch</text>
  <text x="485" y="281" class="msg-detail">validate both users are active (x-internal-service-key)</text>
  <line x1="648" y1="290" x2="476" y2="290" class="arrow-return-http"/>
  <text x="500" y="303" class="msg-detail">{ users: [{ userId, status, name }] }</text>

  <!-- Step 4: Select question via Question Service (HTTP) -->
  <circle cx="26" cy="335" r="12" fill="#9066b0"/>
  <text x="26" y="339" text-anchor="middle" class="step-num">4</text>
  <line x1="468" y1="335" x2="822" y2="335" class="arrow-http"/>
  <text x="530" y="328" class="msg-label">POST /internal/select</text>
  <text x="530" y="348" class="msg-detail">{ topic, difficulty, userAId, userBId } (x-internal-service-key)</text>
  <line x1="830" y1="358" x2="476" y2="358" class="arrow-return-http"/>
  <text x="530" y="372" class="msg-detail">{ questionId, functionName, topic, difficulty }</text>

  <!-- Step 5: Create session in Redis (TCP) -->
  <circle cx="26" cy="405" r="12" fill="#5bb85b"/>
  <text x="26" y="409" text-anchor="middle" class="step-num">5</text>
  <line x1="468" y1="405" x2="977" y2="405" class="arrow-redis"/>
  <text x="600" y="398" class="msg-label">createActiveSession</text>
  <text x="600" y="418" class="msg-detail">HSET session:{id}, SET user-active-session index (idempotent on matchId)</text>

  <!-- Step 6: Initialise OT document (TCP) -->
  <circle cx="26" cy="455" r="12" fill="#5bb85b"/>
  <text x="26" y="459" text-anchor="middle" class="step-num">6</text>
  <line x1="468" y1="455" x2="977" y2="455" class="arrow-redis"/>
  <text x="600" y="448" class="msg-label">Initialise OT document (if newly created)</text>
  <text x="600" y="468" class="msg-detail">SET ot:{id}:content (code template), SET ot:{id}:revision = 0</text>

  <!-- Code template note -->
  <rect x="558" y="478" width="420" height="34" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="568" y="492" class="note-bold">Code template by language:</text>
  <text x="568" y="504" class="note">Python: class Solution: def fn(self): pass  |  JS/TS: class Solution { fn() {} }  |  Java: similar</text>

  <!-- Step 7: Cache session (TCP) -->
  <circle cx="26" cy="540" r="12" fill="#5bb85b"/>
  <text x="26" y="544" text-anchor="middle" class="step-num">7</text>
  <line x1="468" y1="540" x2="977" y2="540" class="arrow-redis"/>
  <text x="600" y="533" class="msg-label">Cache active session</text>
  <text x="600" y="553" class="msg-detail">cacheActiveSession for fast lookup</text>

  <!-- Step 8: Publish to res queue (AMQP) -->
  <circle cx="26" cy="595" r="12" fill="#f59e42"/>
  <text x="26" y="599" text-anchor="middle" class="step-num">8</text>
  <line x1="468" y1="595" x2="286" y2="595" class="arrow-amqp"/>
  <text x="298" y="588" class="msg-label">Publish to collab_create_res_queue</text>
  <text x="298" y="608" class="msg-detail">{ session: { collaborationId, userAId, userBId, ... }, idempotentHit }</text>

  <!-- Step 9: Matching consumes from res queue (AMQP) -->
  <circle cx="26" cy="648" r="12" fill="#e86540"/>
  <text x="26" y="652" text-anchor="middle" class="step-num">9</text>
  <line x1="278" y1="648" x2="101" y2="648" class="arrow-amqp"/>
  <text x="110" y="641" class="msg-label">Consume from collab_create_res_queue</text>
  <text x="110" y="661" class="msg-detail">payload includes collaborationId</text>

  <!-- Step 10: Emit match_success (WebSocket) -->
  <circle cx="26" cy="695" r="12" fill="#e86540"/>
  <text x="26" y="699" text-anchor="middle" class="step-num">10</text>
  <rect x="50" y="683" width="190" height="26" rx="4" fill="#fff3e0" stroke="#c75530" stroke-width="1"/>
  <text x="145" y="700" text-anchor="middle" class="note-bold">emit match_success to BOTH users</text>
  <text x="50" y="723" class="msg-detail">{ collaborationId, matchId, topic, difficulty, language } -> frontend navigates to /collaboration/:id</text>

  <!-- Error handling note -->
  <rect x="40" y="740" width="970" height="28" rx="4" fill="#fef3f3" stroke="#d45b5b" stroke-width="1"/>
  <text x="50" y="758" class="note-bold">Retry logic:</text>
  <text x="120" y="758" class="note">Retryable errors: exponential backoff (2s, 4s, 8s, 16s, 32s) via delay queue with dead-letter routing, max 5 retries.  Non-retryable (user invalid, question not found, conflict): discard + publish failure to res_queue.</text>
</svg>